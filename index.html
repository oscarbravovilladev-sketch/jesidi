    }

    .ui-name-left { text-align: right; }
    .ui-name-right { text-align: left; }

    .ui-bar-wrap {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.08);
    }

    .ui-bar-wrap-left { border-radius: 2px 0 0 2px; margin-right: 1px; }
    .ui-bar-wrap-right { border-radius: 0 2px 2px 0; margin-left: 1px; display: flex; justify-content: flex-end; }

    .ui-bar-fill {
      height: 100%;
      background: #fff;
      transition: width 0.15s;
      width: 0;
    }

    .my-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

    }

    #sensor-info, #fft-info, #audio-ui {

    #p5-canvas {

      top: 0;

    }

    .lil-gui.root {
      z-index: 10000 !important;
      right: 0 !important;
      margin: 0 !important;
      width: 230px !important;
    }

    #top-bar {
      position: fixed;

    #gui-toggle-btn, .set-btn {
      background: rgba(255,255,255,0.15);

      color: #fff;
      font-size: 20px;

      height: 36px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;

      user-select: none;
      flex-shrink: 0;
    }
    .set-btn {
      font-size: 13px;
      font-family: monospace;
      font-weight: bold;
    }
    .set-btn.active {
      background: rgba(255,255,255,0.45);
      border-color: rgba(255,255,255,0.7);
    }
    #gui-toggle-btn:hover, .set-btn:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>

    var isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  </script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>

<body>
  <div id="top-bar">
    <button id="gui-toggle-btn" title="Mostrar/Ocultar configuración">⚙</button>
    <button class="set-btn active" data-set="1" title="Set 1">S1</button>
    <button class="set-btn" data-set="2" title="Set 2">S2</button>
    <button class="set-btn" data-set="3" title="Set 3">S3</button>
    <div id="sensor-info"></div>
  </div>
  <div id="overlay">
    <img src="fondo.png" alt="">
    <h1>CLICK PARA INICIAR</h1>
  </div>

  <canvas class="my-canvas"></canvas>
  <div id="audio-ui">
    <span class="ui-name ui-name-left" id="ui-name-l"></span>
    <div class="ui-bar-wrap ui-bar-wrap-left"><div class="ui-bar-fill" id="ui-bar-l"></div></div>
    <div class="ui-bar-wrap ui-bar-wrap-right"><div class="ui-bar-fill" id="ui-bar-r"></div></div>
    <span class="ui-name ui-name-right" id="ui-name-r"></span>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    // --- CONFIGURACION DE AUDIOS ---
    const AUDIO_SETS = {
      1: [
        'audios/set1_OLAS.mp3',
        'audios/set1_MEGAS.mp3',
        'audios/set1_HORN.mp3',
        'audios/set1_GERBERE.mp3',
        'audios/set1_ERDOGEN.mp3',
        'audios/set1_BARCA.mp3'
      ],
      2: [
        'audios/set2_Arp.mp3',
        'audios/set2_Bright.mp3',
        'audios/set2_HatsnSnare.mp3',
        'audios/set2_Poly.mp3',
        'audios/set2_Tube.mp3',
        'audios/set2_moo.mp3'
      ],
      3: [
        'audios/set3_Audio.mp3',
        'audios/set3_Cars.mp3',
        'audios/set3_Distorted.mp3',
        'audios/set3_Open.mp3',
        'audios/set3_Vintage.mp3',
        'audios/set3_satured.mp3'
      ]
    };
    let currentSet = 1;
    let AUDIOS = AUDIO_SETS[currentSet];
    

    let CROSSFADE = 300;
    // Orden aleatorio de tracks
    const trackOrder = [0, 1, 2, 3, 4, 5];
    function shuffleTrackOrder() {
      for (let i = trackOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [trackOrder[i], trackOrder[j]] = [trackOrder[j], trackOrder[i]];
      }
      ZONES.forEach((z, i) => { z.track = trackOrder[i]; });
    }
    const ZONES = [
      { min: 210, max: 710, track: 0 },
      { min: 710, max: 1210, track: 1 },
      { min: 1210, max: 1710, track: 2 },
      { min: 1710, max: 2210, track: 3 },
      { min: 2210, max: 2710, track: 4 },
      { min: 2710, max: 3200, track: 5 }
    ];
    shuffleTrackOrder();

    // --- ESTADO ---
    let systemStarted = false;
    const audioElements = [];
    const targetVolumes = new Array(AUDIOS.length).fill(0);
    let VOL_SMOOTH = 0.15;

    // --- FFT ---
    let audioCtx = null;
    let masterAnalyser = null;  // Analyser de la mezcla final
    let fftData = null;         // Uint8Array con espectro completo
    let FFT_SIZE = 128;       // bins de frecuencia (128 bandas utiles)
    // Datos FFT extraidos (se actualizan cada frame)
    const fftBands = {
      bass: 0,      // 0-250 Hz (energia de graves)
      mid: 0,       // 250-2000 Hz (energia de medios)
      treble: 0,    // 2000-8000 Hz (energia de agudos)
      energy: 0,    // energia total normalizada 0-1
      peak: 0,      // frecuencia dominante en Hz
      raw: null     // array completo de 128 bandas (0-255 cada una)
    };

    // --- CREAR AUDIO ELEMENTS ---
    AUDIOS.forEach(src => {
      const a = new Audio(src);
      a.loop = true;
      a.volume = 0;
      audioElements.push(a);
    });

    // --- Cambiar set de audio ---
    function switchAudioSet(setNum) {
      if (setNum === currentSet) return;
      currentSet = setNum;
      AUDIOS = AUDIO_SETS[currentSet];
      shuffleTrackOrder();
      audioElements.forEach((a, i) => {
        const wasPlaying = !a.paused;
        const prevTime = a.currentTime;
        a.src = AUDIOS[i];
        a.load();
        if (wasPlaying) {
          a.currentTime = prevTime;
          a.play().catch(e => console.log("Error play:", e));
        }
      });
      // Actualizar botones
      document.querySelectorAll('.set-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.set) === setNum);
      });
      // Guardar set activo y cargar sus params
      localStorage.setItem(LS_KEY_ACTIVE_SET, setNum);
      if (typeof loadSetParams === 'function') {
        loadSetParams(setNum);
        if (typeof refreshGUI === 'function') {
          updateGuardarLabel();
          refreshGUI();
        }
      }
    }

    // Conectar botones de set
    document.querySelectorAll('.set-btn').forEach(btn => {
      btn.addEventListener('click', () => switchAudioSet(parseInt(btn.dataset.set)));
    });

    // --- Helpers para nombres de track ---
    function trackName(trackIdx) {
      return AUDIOS[trackIdx].split('/').pop().replace('.mp3', '');
    }

    // --- MQTT ---
    const clientId = "js_audio_" + Math.random().toString(16).substr(2, 8);
    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
      clientId: clientId,
      clean: true
    });

    client.on("connect", () => client.subscribe("JESIDI-IOT-POC-200574"));

    // Cache de elementos DOM
    const domSensorInfo = document.getElementById('sensor-info');
    const domNameL = document.getElementById('ui-name-l');
    const domNameR = document.getElementById('ui-name-r');
    const domBarL = document.getElementById('ui-bar-l');
    const domBarR = document.getElementById('ui-bar-r');

    client.on("message", (_t, payload) => {
      try {
        const j = JSON.parse(payload.toString());

        domSensorInfo.innerHTML = `
          <div>
            <span>X:${j.x} Y:${j.y}</span>
            <span>D:${j.dist}mm</span>
            <span>A:${j.ang}°</span>
            <span>T:${j.temp}°C</span>
            <span>H:${j.hum} HR</span>
          </div>
        `;
        // Exponer datos del sensor para el shader
        window.sensorData = { x: j.x, y: j.y, dist: j.dist, ang: j.ang, temp: j.temp, hum: j.hum };

        if (systemStarted && j.dist != null) {
          updateAudio(j.dist);
        }
      } catch (e) { console.error("Error MQTT:", e); }
    });

    // --- LOGICA DE AUDIO ---
    function updateAudio(distMm) {
      targetVolumes.fill(0);

      for (let i = 0; i < ZONES.length; i++) {
        const z = ZONES[i];
        if (distMm < z.min || distMm > z.max) continue;
        let vol = 1;
        if (i > 0 && distMm < z.min + CROSSFADE) {
          vol = (distMm - z.min) / CROSSFADE;
          targetVolumes[ZONES[i - 1].track] = 1 - vol;
        }
        if (i < ZONES.length - 1 && distMm > z.max - CROSSFADE) {
          vol = (z.max - distMm) / CROSSFADE;
          targetVolumes[ZONES[i + 1].track] = 1 - vol;
        }
        targetVolumes[z.track] = Math.max(0, Math.min(1, vol));
        break;
      }

      // Aplicar volumenes con suavizado
      audioElements.forEach((a, i) => {
        a.volume += (targetVolumes[i] - a.volume) * VOL_SMOOTH;
        if (a.volume < 0.005) a.volume = 0;
      });

      // UI — encontrar las 2 zonas activas (ordenadas por indice de zona)
      let activeZones = [];
      for (let zi = 0; zi < ZONES.length; zi++) {
        const vol = targetVolumes[ZONES[zi].track];
        if (vol > 0) activeZones.push({ zi, track: ZONES[zi].track, vol });
      }

      if (activeZones.length === 0) {
        domNameL.textContent = '';
        domNameR.textContent = '';
        domBarL.style.width = '0';
        domBarR.style.width = '0';
      } else if (activeZones.length === 1) {
        const a = activeZones[0];
        domNameL.textContent = trackName(a.track);
        domNameR.textContent = '';
        domBarL.style.width = (a.vol * 100) + '%';
        domBarR.style.width = '0';
      } else {
        const left = activeZones[0];
        const right = activeZones[1];
        domNameL.textContent = trackName(left.track);
        domNameR.textContent = trackName(right.track);
        domBarL.style.width = (left.vol * 100) + '%';
        domBarR.style.width = (right.vol * 100) + '%';
      }
    }

    // --- FFT: inicializar Web Audio API ---
    function initAudioFFT() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Nodo de mezcla donde convergen todos los tracks
      const merger = audioCtx.createGain();
      merger.gain.value = 1;
      merger.connect(audioCtx.destination);

      // Conectar cada audio element directo al merger (sin analysers individuales)
      audioElements.forEach(a => {
        audioCtx.createMediaElementSource(a).connect(merger);
      });

      // Analyser maestro en la mezcla final
      masterAnalyser = audioCtx.createAnalyser();
      masterAnalyser.fftSize = FFT_SIZE;
      masterAnalyser.smoothingTimeConstant = 0.8;
      merger.connect(masterAnalyser);

      fftData = new Uint8Array(masterAnalyser.frequencyBinCount);
      fftBands.raw = new Uint8Array(masterAnalyser.frequencyBinCount);
    }

    // --- FFT: extraer datos cada frame ---
    function updateFFT() {
      if (!masterAnalyser) return;
      masterAnalyser.getByteFrequencyData(fftData);

      const bins = fftData.length; // 128
      const nyquist = audioCtx.sampleRate / 2; // tipicamente 22050 Hz
      const hzPerBin = nyquist / bins;

      // Acumular energia por banda
      let bassSum = 0, bassCount = 0;
      let midSum = 0, midCount = 0;
      let trebleSum = 0, trebleCount = 0;
      let totalSum = 0;
      let peakVal = 0, peakBin = 0;

      for (let i = 0; i < bins; i++) {
        const v = fftData[i];
        const hz = i * hzPerBin;
        totalSum += v;

        if (v > peakVal) { peakVal = v; peakBin = i; }

        if (hz < 250) { bassSum += v; bassCount++; }
        else if (hz < 2000) { midSum += v; midCount++; }
        else if (hz < 8000) { trebleSum += v; trebleCount++; }
      }

      fftBands.bass = bassCount > 0 ? (bassSum / bassCount) / 255 : 0;
      fftBands.mid = midCount > 0 ? (midSum / midCount) / 255 : 0;
      fftBands.treble = trebleCount > 0 ? (trebleSum / trebleCount) / 255 : 0;
      fftBands.energy = (totalSum / bins) / 255;
      fftBands.peak = peakBin * hzPerBin;
      fftBands.raw.set(fftData);
    }

    // Exponer FFT para p5
    window.fftBands = fftBands;
    window.updateFFT = updateFFT;

    // --- INICIO ---
    document.getElementById('overlay').addEventListener('click', function () {
      if (!systemStarted) {
        this.style.display = 'none';
        initAudioFFT();
        audioElements.forEach(a => {
          a.play().catch(e => console.log("Error play:", e));
        });
        systemStarted = true;
      }
    });
  </script>

  <script>
    // =============================================
    // =============================================
    // PARAMETROS AJUSTABLES - BLOBS ORGANICOS (acuarela)
    // =============================================
    const ORGANIC_BLOBS = [
      { // Blob superior - crema/beige
        POS_X: 0.0,
        POS_Y: -0.55,
        RADIUS_X: 0.14,          // radio horizontal (proporcion viewport)
        RADIUS_Y: 0.09,          // radio vertical
        COLOR: [245, 235, 215],   // crema
        ALPHA: 45,                // opacidad base (0-255)
        LAYERS: 5,                // capas de acuarela
        NOISE_SCALE: 0.8,
        NOISE_SPEED: 0.15,
        DEFORM: 0.25,             // amplitud de deformacion
        FFT_BAND: 'bass',        // banda FFT que lo modula
        FFT_BREATHE: 0.08,       // expansion por FFT
        FFT_ALPHA: 15,           // opacidad extra por FFT
        ROTATION: -0.15,          // inclinacion base (rad)
        GRAIN: 0.3,              // intensidad de grano/textura
      },
      { // Blob inferior - verde menta
        POS_X: 0.0,
        POS_Y: 0.55,
        RADIUS_X: 0.15,
        RADIUS_Y: 0.10,
        COLOR: [140, 210, 180],   // verde menta
        ALPHA: 40,
        LAYERS: 5,
        NOISE_SCALE: 0.9,
        NOISE_SPEED: 0.12,
        DEFORM: 0.28,
        FFT_BAND: 'treble',
        FFT_BREATHE: 0.10,
        FFT_ALPHA: 12,
        ROTATION: 0.1,
        GRAIN: 0.3,
      },
    ];
    // =============================================

    const FFT_RINGS = {
      NUM_RINGS: 15,              // cantidad de anillos
      CENTER_Y_OFFSET: 0.0,    // desplazamiento vertical del centro (-1 a 1, negativo = arriba)
      BASE_RADIUS: 0.1,         // radio base (proporcion del viewport)
      RING_SPACING: 7,          // separacion entre anillos (px)
      ROTATION_SPEED: 0.17,       // velocidad de rotacion
      ALPHA_BASE: 100,            // opacidad base
      ALPHA_FFT_MULT: 80,        // multiplicador de opacidad por energia
      ALPHA_DECAY: 3,            // reduccion de opacidad por capa
      STROKE_BASE: 2,            // grosor base (px)
      STROKE_DECAY: 0.03,        // reduccion de grosor por capa
      AMP_BASE: 50,          // amplitud base de deformacion FFT
      AMP_FFT_MULT: 5,         // amplitud extra por energia
      SMOOTH_PASSES: 3,          // pasadas de suavizado espacial (mas = mas suave)
      SMOOTH_TEMPORAL: 0.3,      // suavizado temporal entre frames (0-1, menor = mas suave)
      FREQ_MULT: 3,              // veces que se repite el patron FFT alrededor del anillo (mas = mas oscilaciones)
    };
    // =============================================

    // --- P5 FFT Lines + Nebulosas (instance mode) ---
    const fftViz = (p) => {
      let smoothedFFT = null; // buffer para suavizado temporal

      // Suavizado espacial: moving average circular
      function smoothSpatial(arr, passes) {
        let src = arr;
        let dst = new Float32Array(arr.length);
        for (let pass = 0; pass < passes; pass++) {
          for (let i = 0; i < src.length; i++) {
            const prev = src[(i - 1 + src.length) % src.length];
            const curr = src[i];
            const next = src[(i + 1) % src.length];
            dst[i] = prev * 0.25 + curr * 0.5 + next * 0.25;
          }
          // Intercambiar buffers
          const tmp = src;
          src = dst;
          dst = (pass === 0) ? new Float32Array(arr.length) : tmp;
        }
        return src;
      }

      // --- Blobs organicos estilo acuarela ---
      // Pre-computar LUT para los blobs (60 vertices por blob)
      const _blobRes = 60;
      const _blobCos = new Float32Array(_blobRes);
      const _blobSin = new Float32Array(_blobRes);
      for (let i = 0; i < _blobRes; i++) {
        const a = (i / _blobRes) * Math.PI * 2;
        _blobCos[i] = Math.cos(a);
        _blobSin[i] = Math.sin(a);
      }

      function drawOrganicBlob(p, cfg, bands, t, cx, cy) {
        const ctx = p.drawingContext;
        const vMin = Math.min(p.width, p.height);
        const fftVal = bands[cfg.FFT_BAND] || 0;

        const centerX = cx + vMin * cfg.POS_X;
        const centerY = cy + vMin * cfg.POS_Y;
        const breathe = 1 + fftVal * cfg.FFT_BREATHE;
        const rx = vMin * cfg.RADIUS_X * breathe;
        const ry = vMin * cfg.RADIUS_Y * breathe;
        const tSpeed = t * cfg.NOISE_SPEED;
        const [cr, cg, cb] = cfg.COLOR;

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(cfg.ROTATION + Math.sin(t * 0.1) * 0.03);

        // Dibujar multiples capas con variaciones para efecto acuarela
        for (let layer = 0; layer < cfg.LAYERS; layer++) {
          const layerT = layer / cfg.LAYERS;
          // Cada capa tiene offset de noise y tamaño ligeramente distinto
          const layerScale = 1 - layerT * 0.12;
          const layerSeed = layer * 7.7;
          const alpha = (cfg.ALPHA + fftVal * cfg.FFT_ALPHA) * (1 - layerT * 0.3);

          ctx.beginPath();
          // Primer punto
          const n0 = p.noise(_blobCos[0] * cfg.NOISE_SCALE + tSpeed, _blobSin[0] * cfg.NOISE_SCALE + tSpeed * 0.6, layerSeed);
          const dr0x = rx * layerScale * (1 + (n0 - 0.5) * cfg.DEFORM * 2);
          const dr0y = ry * layerScale * (1 + (n0 - 0.5) * cfg.DEFORM * 2);
          const x0 = _blobCos[0] * dr0x;
          const y0 = _blobSin[0] * dr0y;

          // Punto previo para inicio suave
          const nL = p.noise(_blobCos[_blobRes-1] * cfg.NOISE_SCALE + tSpeed, _blobSin[_blobRes-1] * cfg.NOISE_SCALE + tSpeed * 0.6, layerSeed);
          const drLx = rx * layerScale * (1 + (nL - 0.5) * cfg.DEFORM * 2);
          const drLy = ry * layerScale * (1 + (nL - 0.5) * cfg.DEFORM * 2);
          const xL = _blobCos[_blobRes-1] * drLx;
          const yL = _blobSin[_blobRes-1] * drLy;
          ctx.moveTo((xL + x0) / 2, (yL + y0) / 2);

          for (let i = 0; i < _blobRes; i++) {
            const next = (i + 1) % _blobRes;
            const ni = p.noise(_blobCos[i] * cfg.NOISE_SCALE + tSpeed, _blobSin[i] * cfg.NOISE_SCALE + tSpeed * 0.6, layerSeed);
            const nn = p.noise(_blobCos[next] * cfg.NOISE_SCALE + tSpeed, _blobSin[next] * cfg.NOISE_SCALE + tSpeed * 0.6, layerSeed);
            const dix = rx * layerScale * (1 + (ni - 0.5) * cfg.DEFORM * 2);
            const diy = ry * layerScale * (1 + (ni - 0.5) * cfg.DEFORM * 2);
            const dnx = rx * layerScale * (1 + (nn - 0.5) * cfg.DEFORM * 2);
            const dny = ry * layerScale * (1 + (nn - 0.5) * cfg.DEFORM * 2);
            const xi = _blobCos[i] * dix;
            const yi = _blobSin[i] * diy;
            const xn = _blobCos[next] * dnx;
            const yn = _blobSin[next] * dny;
            ctx.quadraticCurveTo(xi, yi, (xi + xn) / 2, (yi + yn) / 2);
          }
          ctx.closePath();

          // Fill con color semitransparente
          ctx.fillStyle = `rgba(${cr},${cg},${cb},${alpha / 255})`;
          ctx.fill();

          // Borde sutil solo en la capa exterior
          if (layer === 0) {
            ctx.strokeStyle = `rgba(${cr * 0.8 | 0},${cg * 0.8 | 0},${cb * 0.8 | 0},${(alpha * 0.6) / 255})`;
            ctx.lineWidth = 1.2;
            ctx.stroke();
          }
        }

        // Textura de grano (acuarela) - puntos aleatorios dentro del blob
        if (cfg.GRAIN > 0) {
          const grainCount = 80;
          for (let i = 0; i < grainCount; i++) {
            const ga = p.noise(i * 0.3, t * 0.05) * Math.PI * 2;
            const gd = p.noise(i * 0.3 + 50, t * 0.05) * 0.8;
            const gx = Math.cos(ga) * rx * gd;
            const gy = Math.sin(ga) * ry * gd;
            const galpha = p.noise(i * 0.7, t * 0.1) * cfg.GRAIN;
            ctx.fillStyle = `rgba(255,255,255,${galpha * 0.3})`;
            ctx.fillRect(gx - 1, gy - 1, 2, 2);
          }
        }

        ctx.restore();
      }

      p.setup = () => {
        const c = p.createCanvas(p.windowWidth, p.windowHeight);
        c.id('p5-canvas');
        p.frameRate(isTouchDevice ? 24 : 30);
      };

      p.draw = () => {
        p.clear();
        if (window.updateFFT) window.updateFFT();
        const bands = window.fftBands;
        if (!bands || !bands.raw) return;

        const R = FFT_RINGS;
        const raw = bands.raw;
        const bins = raw.length;

        // Inicializar buffer de suavizado temporal
        if (!smoothedFFT) smoothedFFT = new Float32Array(bins);

        // Suavizado temporal: interpolar entre frame anterior y actual
        for (let i = 0; i < bins; i++) {
          smoothedFFT[i] += (raw[i] - smoothedFFT[i]) * R.SMOOTH_TEMPORAL;
        }

        // Suavizado espacial
        const smooth = smoothSpatial(smoothedFFT, R.SMOOTH_PASSES);

        const t = p.millis() / 1000;
        const cx = p.width / 2;
        const vMin = p.min(p.width, p.height);
        const cyBase = p.height / 2;
        const cy = cyBase + vMin * R.CENTER_Y_OFFSET;
        const baseR = vMin * R.BASE_RADIUS;
        const ringSpacing = R.RING_SPACING * vMin / 400;

        // --- Dibujar Blobs Organicos (detras de todo) ---
        for (let b = 0; b < ORGANIC_BLOBS.length; b++) {
          drawOrganicBlob(p, ORGANIC_BLOBS[b], bands, t, cx, cyBase);
        }

        p.noFill();

        for (let layer = 0; layer < R.NUM_RINGS; layer++) {
          const rOffset = baseR + layer * ringSpacing;
          const phase = layer * p.TWO_PI / R.NUM_RINGS + t * R.ROTATION_SPEED * (layer % 2 === 0 ? 1 : -1);
          const alpha = R.ALPHA_BASE + bands.energy * R.ALPHA_FFT_MULT - layer * R.ALPHA_DECAY;

          p.stroke(255, alpha);
          p.strokeWeight(R.STROKE_BASE - layer * R.STROKE_DECAY);

          const totalPts = bins * R.FREQ_MULT;
          p.beginShape();
          for (let i = 0; i <= totalPts; i++) {
            const idx = i % bins;
            const angle = p.map(i, 0, totalPts, 0, p.TWO_PI) + phase;
            const amp = smooth[idx] / 255;
            const r = rOffset + amp * (R.AMP_BASE + bands.energy * R.AMP_FFT_MULT);
            p.curveVertex(cx + p.cos(angle) * r, cy + p.sin(angle) * r);
          }
          for (let i = 0; i < 3; i++) {
            const idx = i % bins;
            const angle = p.map(i, 0, totalPts, 0, p.TWO_PI) + phase;
            const amp = smooth[idx] / 255;
            const r = rOffset + amp * (R.AMP_BASE + bands.energy * R.AMP_FFT_MULT);
            p.curveVertex(cx + p.cos(angle) * r, cy + p.sin(angle) * r);
          }
          p.endShape();
        }
      };

      p.windowResized = () => {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
      };
    };

    new p5(fftViz);
  </script>

  <script>
    // =============================================
    // PARAMETROS AJUSTABLES - SHADER TORUS
    // =============================================
    const SHADER_PARAMS = {
      RESOLUTION_SCALE: 0.6,     // resolucion del shader (0.5=50%, 0.75=75%, 1=nativa)
      CENTER_Y_OFFSET: 0.0,    // desplazamiento vertical (-1 arriba, 1 abajo)
      CENTER_X_OFFSET: 0.0,      // desplazamiento horizontal (-1 izq, 1 der)
      TORUS_SCALE: 0.55,          // escala base del torus
      TORUS_THICKNESS: 0.15,      // grosor del anillo del torus
      SMALL_SPHERE_SIZE: 0.1,    // tamaño de la esfera orbitante
      BLEND_AMOUNT: 0.3,         // blend entre torus y esfera
      NOISE_SPEED: 0.2,          // velocidad de animacion del noise
      MOBILE_SCALE_MIN: 0.37,    // escala minima en movil
      MOBILE_SCALE_FACTOR: 0.35, // factor de escala por aspect ratio
      // Orbita circular de la esfera pequeña
      ORBIT_RADIUS: 0.1,        // radio base de la orbita (distancia minima al centro)
      ORBIT_SPEED: 0.2,          // velocidad de rotacion (rad/s)
      ORBIT_FFT_PUSH: 1,       // cuanto se aleja la esfera con energia FFT
      // Color
      COLOR_RANGE: 0.2,           // amplitud del color (menor = mas blanco, 0-1)
      COLOR_BASE: 0.5,           // base del color (mayor = mas blanco, 0-1)
      COLOR_POW: 2,               // exponente de contraste (menor = mas blanco, 1-8)
    };

    function snapshotParams() {
      return {
        blobs: ORGANIC_BLOBS.map(b => Object.assign({}, b, { COLOR: [...b.COLOR] })),
        rings: Object.assign({}, FFT_RINGS),
        shader: Object.assign({}, SHADER_PARAMS),

      snap.blobs.forEach((s, i) => {
        const target = ORGANIC_BLOBS[i];
        for (const k in s) {
          if (k === 'COLOR') { target.COLOR[0] = s.COLOR[0]; target.COLOR[1] = s.COLOR[1]; target.COLOR[2] = s.COLOR[2]; }
          else target[k] = s[k];
        }

      Object.assign(FFT_RINGS, snap.rings);
      Object.assign(SHADER_PARAMS, snap.shader);

  <script>
    // Opt #8: throttle requestAnimationFrame a ~30fps en tablets
    if (isTouchDevice) {
      const _nativeRAF = window.requestAnimationFrame.bind(window);
      const _frameInterval = 1000 / 30;
      let _lastFrame = 0;
      window.requestAnimationFrame = function(callback) {
        return _nativeRAF(function(ts) {
          const elapsed = ts - _lastFrame;
          if (elapsed >= _frameInterval) {
            _lastFrame = ts - (elapsed % _frameInterval);
            callback(ts);
          } else {
            setTimeout(function() { _nativeRAF(callback); }, _frameInterval - elapsed);
          }
        });
      };
    }
  </script>

  <script type="module">
    import {sculptToMinimalRenderer} from 'https://unpkg.com/shader-park-core/dist/shader-park-core.esm.js';

    const S = SHADER_PARAMS;

    const spCode = `
      setMaxIterations(4);
      let click = input();
      let buttonHover = input();
      let circX = input();
      let circY = input();
      let sScale = input();
      let oX = input();
      let oY = input();
      let tScale = input();
      let tThick = input();
      let sphSize = input();
      let blendAmt = input();
      let nSpeed = input();
      let cRange = input();
      let cBase = input();
      let cPow = input();
      let offset = .1;
      function fbm(p) {
        return vec3(
          noise(p),
          noise(p+offset),
          noise(p+offset*2),
        )
      }

      let s = getRayDirection();
      let n = sin(fbm(s+vec3(0, 0, -time*nSpeed))*2)*cRange+cBase;
      n = pow(n, vec3(cPow));
      color(n)
      let scale = (tScale+n.x*.05) * sScale;
      displace(oX, oY, 0)
      shape(() => {
          rotateX(PI/2);
          rotateX(circX* click)
          rotateZ(-1*circY* click)
          torus(scale, tThick * sScale)
          reset();
          mixGeo(click)
          sphere(scale);
      })()
      blend(blendAmt)
      displace(circX*2, circY, 0)
      sphere(sphSize * sScale)
    `;

    let canvas = document.querySelector('.my-canvas');

    // Opt: renderizar shader a menor resolucion
    const _resScale = S.RESOLUTION_SCALE;
    canvas.width = Math.floor(canvas.clientWidth * _resScale);
    canvas.height = Math.floor(canvas.clientHeight * _resScale);
    // Re-aplicar en resize
    window.addEventListener('resize', () => {
      canvas.width = Math.floor(canvas.clientWidth * _resScale);
      canvas.height = Math.floor(canvas.clientHeight * _resScale);
    });

    let state = {
      buttonHover: 0.0,
      currButtonHover: 0.0,
      click: 0.0,
      currClick: 0.0,
      circX: 0.0,
      circY: 0.0
    };

    canvas.addEventListener('mouseover', () => state.buttonHover = 5, false);
    canvas.addEventListener('mouseout', () => state.buttonHover = 0.0, false);
    canvas.addEventListener('mousedown', () => state.click = 1.0, false);
    canvas.addEventListener('mouseup', () => state.click = 0.0, false);

    sculptToMinimalRenderer(canvas, spCode, () => {
      const sd = window.sensorData;
      if (sd && sd.dist != null) {
        state.click = Math.max(0, Math.min(1, 1 - sd.dist / 3200));
        state.buttonHover = (sd.temp || 20) / 40 * 5;
      }

      // Orbita circular con radio modulado por FFT
      const t = performance.now() / 1000;
      const bands = window.fftBands;
      const energy = bands ? bands.energy : 0;
      const radius = S.ORBIT_RADIUS + energy * S.ORBIT_FFT_PUSH;
      state.circX = Math.cos(t * S.ORBIT_SPEED) * radius;
      state.circY = Math.sin(t * S.ORBIT_SPEED) * radius;

      state.currButtonHover = state.currButtonHover * .999 + state.buttonHover * .001;
      state.currClick = state.currClick * .92 + state.click * .08;

      const aspect = canvas.clientWidth / canvas.clientHeight;
      const sScale = aspect < 1 ? S.MOBILE_SCALE_MIN + aspect * S.MOBILE_SCALE_FACTOR : 1.0;

      return {
        'buttonHover': state.currButtonHover,
        'click': state.currClick,
        'circX': state.circX,
        'circY': state.circY,
        'sScale': sScale,
        'oX': S.CENTER_X_OFFSET,
        'oY': S.CENTER_Y_OFFSET,
        'tScale': S.TORUS_SCALE,
        'tThick': S.TORUS_THICKNESS,
        'sphSize': S.SMALL_SPHERE_SIZE,
        'blendAmt': S.BLEND_AMOUNT,
        'nSpeed': S.NOISE_SPEED,
        'cRange': S.COLOR_RANGE,
        'cBase': S.COLOR_BASE,
        'cPow': S.COLOR_POW,
      };
    });
  </script>
