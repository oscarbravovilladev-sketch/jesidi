<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>JdM - Audio IOT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      color: #eee;
      font-family: monospace;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #d7dade;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      cursor: pointer;
    }

    #overlay img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
    }

    #overlay h1 {
      position: absolute;
      margin-top:-5px;
      padding:0;
      font-size:18px;
    }

    #sensor-info {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 11;
      color: rgb(69, 69, 69);
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 10px;
      
    }

    #sensor-info span {
      padding-right: 3px;
    }

    #audio-ui {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 11;
      display: flex;
      align-items: center;
      height: 36px;
      padding: 0;
      box-sizing: border-box;
      font-family: monospace;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }

    .ui-name {
      font-size: 11px;
      white-space: nowrap;
      padding: 0 12px;
      min-width: 70px;
      color: #eee;
    }

    .ui-name-left { text-align: right; }
    .ui-name-right { text-align: left; }

    .ui-bar-wrap {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.08);
    }

    .ui-bar-wrap-left { border-radius: 2px 0 0 2px; margin-right: 1px; }
    .ui-bar-wrap-right { border-radius: 0 2px 2px 0; margin-left: 1px; display: flex; justify-content: flex-end; }

    .ui-bar-fill {
      height: 100%;
      background: #fff;
      transition: width 0.15s;
      width: 0;
    }

    .my-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #sensor-info, #fft-info, #audio-ui {
      z-index: 11;
    }
    #p5-canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 5;
      pointer-events: none;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
</head>

<body>
  <div id="overlay">
    <img src="fondo.png" alt="">
    <h1>CLICK PARA INICIAR</h1>
  </div>

  <canvas class="my-canvas"></canvas>
  <div id="sensor-info"></div>
  <div id="audio-ui">
    <span class="ui-name ui-name-left" id="ui-name-l"></span>
    <div class="ui-bar-wrap ui-bar-wrap-left"><div class="ui-bar-fill" id="ui-bar-l"></div></div>
    <div class="ui-bar-wrap ui-bar-wrap-right"><div class="ui-bar-fill" id="ui-bar-r"></div></div>
    <span class="ui-name ui-name-right" id="ui-name-r"></span>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    // --- CONFIGURACION DE AUDIOS ---
    const AUDIOS = [
      'audios/OLAS.mp3',
      'audios/MEGAS.mp3',
      'audios/HORN.mp3',
      'audios/GERBERE.mp3',
      'audios/ERDOGEN.mp3',
      'audios/BARCA.mp3'
    ];

    const CROSSFADE = 300;
    // Orden aleatorio de tracks en cada carga
    const trackOrder = [0, 1, 2, 3, 4, 5];
    for (let i = trackOrder.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [trackOrder[i], trackOrder[j]] = [trackOrder[j], trackOrder[i]];
    }
    const ZONES = [
      { min: 210, max: 710, track: trackOrder[0] },
      { min: 710, max: 1210, track: trackOrder[1] },
      { min: 1210, max: 1710, track: trackOrder[2] },
      { min: 1710, max: 2210, track: trackOrder[3] },
      { min: 2210, max: 2710, track: trackOrder[4] },
      { min: 2710, max: 3200, track: trackOrder[5] }
    ];

    // --- ESTADO ---
    let systemStarted = false;
    const audioElements = [];
    const targetVolumes = new Array(AUDIOS.length).fill(0);
    const VOL_SMOOTH = 0.15;

    // --- FFT ---
    let audioCtx = null;
    const analysers = [];       // AnalyserNode por track
    const sources = [];         // MediaElementSource por track
    let masterAnalyser = null;  // Analyser de la mezcla final
    let fftData = null;         // Uint8Array con espectro completo
    const FFT_SIZE = 256;       // bins de frecuencia (128 bandas utiles)
    // Datos FFT extraidos (se actualizan cada frame)
    const fftBands = {
      bass: 0,      // 0-250 Hz (energia de graves)
      mid: 0,       // 250-2000 Hz (energia de medios)
      treble: 0,    // 2000-8000 Hz (energia de agudos)
      energy: 0,    // energia total normalizada 0-1
      peak: 0,      // frecuencia dominante en Hz
      raw: null     // array completo de 128 bandas (0-255 cada una)
    };

    // --- CREAR AUDIO ELEMENTS ---
    AUDIOS.forEach(src => {
      const a = new Audio(src);
      a.loop = true;
      a.volume = 0;
      audioElements.push(a);
    });

    // --- Helpers para nombres de track ---
    function trackName(trackIdx) {
      return AUDIOS[trackIdx].split('/').pop().replace('.mp3', '');
    }

    // --- MQTT ---
    const clientId = "js_audio_" + Math.random().toString(16).substr(2, 8);
    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
      clientId: clientId,
      clean: true
    });

    client.on("connect", () => client.subscribe("JESIDI-IOT-POC-200574"));

    client.on("message", (_t, payload) => {
      try {
        const j = JSON.parse(payload.toString());

        document.getElementById('sensor-info').innerHTML = `
          <div>
            <span>X:${j.x} Y:${j.y}</span>
            <span>D:${j.dist}mm</span>
            <span>A:${j.ang}°</span>
            <span>T:${j.temp}°C</span>
            <span>H:${j.hum} HR</span>
          </div>
        `;
        // Exponer datos del sensor para el shader
        window.sensorData = { x: j.x, y: j.y, dist: j.dist, ang: j.ang, temp: j.temp, hum: j.hum };

        if (systemStarted && j.dist != null) {
          updateAudio(j.dist);
        }
      } catch (e) { console.error("Error MQTT:", e); }
    });

    // --- LOGICA DE AUDIO ---
    function updateAudio(distMm) {
      targetVolumes.fill(0);

      for (let i = 0; i < ZONES.length; i++) {
        const z = ZONES[i];
        if (distMm < z.min || distMm > z.max) continue;
        let vol = 1;
        if (i > 0 && distMm < z.min + CROSSFADE) {
          vol = (distMm - z.min) / CROSSFADE;
          targetVolumes[ZONES[i - 1].track] = 1 - vol;
        }
        if (i < ZONES.length - 1 && distMm > z.max - CROSSFADE) {
          vol = (z.max - distMm) / CROSSFADE;
          targetVolumes[ZONES[i + 1].track] = 1 - vol;
        }
        targetVolumes[z.track] = Math.max(0, Math.min(1, vol));
        break;
      }

      // Aplicar volumenes con suavizado
      audioElements.forEach((a, i) => {
        a.volume += (targetVolumes[i] - a.volume) * VOL_SMOOTH;
        if (a.volume < 0.005) a.volume = 0;
      });

      // UI — encontrar las 2 zonas activas (ordenadas por indice de zona)
      let activeZones = [];
      for (let zi = 0; zi < ZONES.length; zi++) {
        const vol = targetVolumes[ZONES[zi].track];
        if (vol > 0) activeZones.push({ zi, track: ZONES[zi].track, vol });
      }

      const nameL = document.getElementById('ui-name-l');
      const nameR = document.getElementById('ui-name-r');
      const barL = document.getElementById('ui-bar-l');
      const barR = document.getElementById('ui-bar-r');

      if (activeZones.length === 0) {
        nameL.textContent = '';
        nameR.textContent = '';
        barL.style.width = '0';
        barR.style.width = '0';
      } else if (activeZones.length === 1) {
        const a = activeZones[0];
        nameL.textContent = trackName(a.track);
        nameR.textContent = '';
        barL.style.width = (a.vol * 100) + '%';
        barR.style.width = '0';
      } else {
        const left = activeZones[0];
        const right = activeZones[1];
        nameL.textContent = trackName(left.track);
        nameR.textContent = trackName(right.track);
        barL.style.width = (left.vol * 100) + '%';
        barR.style.width = (right.vol * 100) + '%';
      }
    }

    // --- FFT: inicializar Web Audio API ---
    function initAudioFFT() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Nodo de mezcla donde convergen todos los tracks
      const merger = audioCtx.createGain();
      merger.gain.value = 1;
      merger.connect(audioCtx.destination);

      // Conectar cada audio element a su analyser y al merger
      audioElements.forEach(a => {
        const src = audioCtx.createMediaElementSource(a);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = FFT_SIZE;
        analyser.smoothingTimeConstant = 0.8;
        src.connect(analyser);
        analyser.connect(merger);
        sources.push(src);
        analysers.push(analyser);
      });

      // Analyser maestro en la mezcla final
      masterAnalyser = audioCtx.createAnalyser();
      masterAnalyser.fftSize = FFT_SIZE;
      masterAnalyser.smoothingTimeConstant = 0.8;
      merger.connect(masterAnalyser);

      fftData = new Uint8Array(masterAnalyser.frequencyBinCount);
      fftBands.raw = new Uint8Array(masterAnalyser.frequencyBinCount);
    }

    // --- FFT: extraer datos cada frame ---
    function updateFFT() {
      if (!masterAnalyser) return;
      masterAnalyser.getByteFrequencyData(fftData);

      const bins = fftData.length; // 128
      const nyquist = audioCtx.sampleRate / 2; // tipicamente 22050 Hz
      const hzPerBin = nyquist / bins;

      // Acumular energia por banda
      let bassSum = 0, bassCount = 0;
      let midSum = 0, midCount = 0;
      let trebleSum = 0, trebleCount = 0;
      let totalSum = 0;
      let peakVal = 0, peakBin = 0;

      for (let i = 0; i < bins; i++) {
        const v = fftData[i];
        const hz = i * hzPerBin;
        totalSum += v;

        if (v > peakVal) { peakVal = v; peakBin = i; }

        if (hz < 250) { bassSum += v; bassCount++; }
        else if (hz < 2000) { midSum += v; midCount++; }
        else if (hz < 8000) { trebleSum += v; trebleCount++; }
      }

      fftBands.bass = bassCount > 0 ? (bassSum / bassCount) / 255 : 0;
      fftBands.mid = midCount > 0 ? (midSum / midCount) / 255 : 0;
      fftBands.treble = trebleCount > 0 ? (trebleSum / trebleCount) / 255 : 0;
      fftBands.energy = (totalSum / bins) / 255;
      fftBands.peak = peakBin * hzPerBin;
      fftBands.raw.set(fftData);
    }

    // Exponer FFT para p5
    window.fftBands = fftBands;
    window.updateFFT = updateFFT;

    // --- INICIO ---
    document.getElementById('overlay').addEventListener('click', function () {
      if (!systemStarted) {
        this.style.display = 'none';
        initAudioFFT();
        audioElements.forEach(a => {
          a.play().catch(e => console.log("Error play:", e));
        });
        systemStarted = true;
      }
    });
  </script>

  <script>
    // =============================================
    // PARAMETROS AJUSTABLES - FFT RINGS
    // =============================================
    const FFT_RINGS = {
      NUM_RINGS: 15,              // cantidad de anillos
      CENTER_Y_OFFSET: 0.05,    // desplazamiento vertical del centro (-1 a 1, negativo = arriba)
      BASE_RADIUS: 0.1,         // radio base (proporcion del viewport)
      RING_SPACING: 7.5,          // separacion entre anillos (px)
      ROTATION_SPEED: 0.17,       // velocidad de rotacion
      ALPHA_BASE: 100,            // opacidad base
      ALPHA_FFT_MULT: 80,        // multiplicador de opacidad por energia
      ALPHA_DECAY: 3,            // reduccion de opacidad por capa
      STROKE_BASE: 2,            // grosor base (px)
      STROKE_DECAY: 0.03,        // reduccion de grosor por capa
      AMP_BASE: 50,          // amplitud base de deformacion FFT
      AMP_FFT_MULT: 5,         // amplitud extra por energia
    };
    // =============================================

    // --- P5 FFT Lines (instance mode) ---
    const fftViz = (p) => {
      p.setup = () => {
        const c = p.createCanvas(p.windowWidth, p.windowHeight);
        c.id('p5-canvas');
        p.frameRate(30);
      };

      p.draw = () => {
        p.clear();
        if (window.updateFFT) window.updateFFT();
        const bands = window.fftBands;
        if (!bands || !bands.raw) return;

        const R = FFT_RINGS;
        const raw = bands.raw;
        const bins = raw.length;
        const t = p.millis() / 1000;
        const cx = p.width / 2;
        const cy = p.height / 2 + p.height * R.CENTER_Y_OFFSET;
        const baseR = p.min(p.width, p.height) * R.BASE_RADIUS;

        p.noFill();

        for (let layer = 0; layer < R.NUM_RINGS; layer++) {
          const rOffset = baseR + layer * R.RING_SPACING;
          const phase = layer * p.TWO_PI / R.NUM_RINGS + t * R.ROTATION_SPEED * (layer % 2 === 0 ? 1 : -1);
          const alpha = R.ALPHA_BASE + bands.energy * R.ALPHA_FFT_MULT - layer * R.ALPHA_DECAY;

          p.stroke(255, alpha);
          p.strokeWeight(R.STROKE_BASE - layer * R.STROKE_DECAY);

          p.beginShape();
          for (let i = 0; i <= bins; i++) {
            const idx = i % bins;
            const angle = p.map(i, 0, bins, 0, p.TWO_PI) + phase;
            const amp = raw[idx] / 255;
            const r = rOffset + amp * (R.AMP_BASE + bands.energy * R.AMP_FFT_MULT);
            p.curveVertex(cx + p.cos(angle) * r, cy + p.sin(angle) * r);
          }
          for (let i = 0; i < 3; i++) {
            const angle = p.map(i, 0, bins, 0, p.TWO_PI) + phase;
            const amp = raw[i] / 255;
            const r = rOffset + amp * (R.AMP_BASE + bands.energy * R.AMP_FFT_MULT);
            p.curveVertex(cx + p.cos(angle) * r, cy + p.sin(angle) * r);
          }
          p.endShape();
        }
      };

      p.windowResized = () => {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
      };
    };

    new p5(fftViz);
  </script>

  <script>
    // =============================================
    // PARAMETROS AJUSTABLES - SHADER TORUS
    // =============================================
    const SHADER_PARAMS = {
      CENTER_Y_OFFSET: 0.0,    // desplazamiento vertical (-1 arriba, 1 abajo)
      CENTER_X_OFFSET: 0.0,      // desplazamiento horizontal (-1 izq, 1 der)
      TORUS_SCALE: 0.6,          // escala base del torus
      TORUS_THICKNESS: 0.2,      // grosor del anillo del torus
      SMALL_SPHERE_SIZE: 0.1,    // tamaño de la esfera orbitante
      BLEND_AMOUNT: 0.3,         // blend entre torus y esfera
      NOISE_SPEED: 0.2,          // velocidad de animacion del noise
      MOBILE_SCALE_MIN: 0.37,    // escala minima en movil
      MOBILE_SCALE_FACTOR: 0.35, // factor de escala por aspect ratio
      // Orbita circular de la esfera pequeña
      ORBIT_RADIUS: 0.1,        // radio base de la orbita (distancia minima al centro)
      ORBIT_SPEED: 0.2,          // velocidad de rotacion (rad/s)
      ORBIT_FFT_PUSH: 1,       // cuanto se aleja la esfera con energia FFT
      // Color
      COLOR_RANGE: 0.2,           // amplitud del color (menor = mas blanco, 0-1)
      COLOR_BASE: 0.5,           // base del color (mayor = mas blanco, 0-1)
      COLOR_POW: 2,               // exponente de contraste (menor = mas blanco, 1-8)
    };
    // =============================================
  </script>

  <script type="module">
    import {sculptToMinimalRenderer} from 'https://unpkg.com/shader-park-core/dist/shader-park-core.esm.js';

    const S = SHADER_PARAMS;

    const spCode = `
      setMaxIterations(8);
      let click = input();
      let buttonHover = input();
      let circX = input();
      let circY = input();
      let sScale = input();
      let oX = input();
      let oY = input();
      let tScale = input();
      let tThick = input();
      let sphSize = input();
      let blendAmt = input();
      let nSpeed = input();
      let cRange = input();
      let cBase = input();
      let cPow = input();
      let offset = .1;
      function fbm(p) {
        return vec3(
          noise(p),
          noise(p+offset),
          noise(p+offset*2),
        )
      }

      let s = getRayDirection();
      let n = sin(fbm(s+vec3(0, 0, -time*nSpeed))*2)*cRange+cBase;
      n = pow(n, vec3(cPow));
      color(n)
      let scale = (tScale+n.x*.05) * sScale;
      displace(oX, oY, 0)
      shape(() => {
          rotateX(PI/2);
          rotateX(circX* click)
          rotateZ(-1*circY* click)
          torus(scale, tThick * sScale)
          reset();
          mixGeo(click)
          sphere(scale);
      })()
      blend(blendAmt)
      displace(circX*2, circY, 0)
      sphere(sphSize * sScale)
    `;

    let canvas = document.querySelector('.my-canvas');
    let state = {
      buttonHover: 0.0,
      currButtonHover: 0.0,
      click: 0.0,
      currClick: 0.0,
      circX: 0.0,
      circY: 0.0
    };

    canvas.addEventListener('mouseover', () => state.buttonHover = 5, false);
    canvas.addEventListener('mouseout', () => state.buttonHover = 0.0, false);
    canvas.addEventListener('mousedown', () => state.click = 1.0, false);
    canvas.addEventListener('mouseup', () => state.click = 0.0, false);

    sculptToMinimalRenderer(canvas, spCode, () => {
      const sd = window.sensorData;
      if (sd && sd.dist != null) {
        state.click = Math.max(0, Math.min(1, 1 - sd.dist / 3200));
        state.buttonHover = (sd.temp || 20) / 40 * 5;
      }

      // Orbita circular con radio modulado por FFT
      const t = performance.now() / 1000;
      const bands = window.fftBands;
      const energy = bands ? bands.energy : 0;
      const radius = S.ORBIT_RADIUS + energy * S.ORBIT_FFT_PUSH;
      state.circX = Math.cos(t * S.ORBIT_SPEED) * radius;
      state.circY = Math.sin(t * S.ORBIT_SPEED) * radius;

      state.currButtonHover = state.currButtonHover * .999 + state.buttonHover * .001;
      state.currClick = state.currClick * .92 + state.click * .08;

      const aspect = canvas.clientWidth / canvas.clientHeight;
      const sScale = aspect < 1 ? S.MOBILE_SCALE_MIN + aspect * S.MOBILE_SCALE_FACTOR : 1.0;

      return {
        'buttonHover': state.currButtonHover,
        'click': state.currClick,
        'circX': state.circX,
        'circY': state.circY,
        'sScale': sScale,
        'oX': S.CENTER_X_OFFSET,
        'oY': S.CENTER_Y_OFFSET,
        'tScale': S.TORUS_SCALE,
        'tThick': S.TORUS_THICKNESS,
        'sphSize': S.SMALL_SPHERE_SIZE,
        'blendAmt': S.BLEND_AMOUNT,
        'nSpeed': S.NOISE_SPEED,
        'cRange': S.COLOR_RANGE,
        'cBase': S.COLOR_BASE,
        'cPow': S.COLOR_POW,
      };
    });
  </script>
</body>

</html>
