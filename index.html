<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>JdM - Audio IOT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      color: #eee;
      font-family: monospace;
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #0f0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      cursor: pointer;
    }

    #sensor-info {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 11;
      background: rgba(0, 0, 0, 0.6);
      color: #0f0;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 10px;
    }

    #sensor-info span {
      padding-right: 3px;
    }

    #audio-ui {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 11;
      text-shadow: 0 0 6px rgba(0, 0, 0, 1), 0 0 12px rgba(0, 0, 0, 0.9), 0 2px 20px rgba(0, 0, 0, 0.8);
      text-align: center;
    }

    #tracks-ui {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-right: 60px;
    }

    .track-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0;
      font-size: 14px;
    }

    .track-bar .track-name {
      display: inline-block;
      width: 80px;
      text-align: right;
    }

    .track-bar .vol {
      width: 120px;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .track-bar .vol::after {
      content: '';
      position: absolute;
      left: 50%;
      top: -2px;
      width: 1px;
      height: 12px;
      background: #888;
    }


    .track-bar .vol-fill {
      height: 100%;
      background: #0f0;
      transition: width 0.15s;
    }

    .track-bar .vol-val {
      display: inline-block;
      width: 40px;
      text-align: right;
    }

    .active-track {
      color: #0f0;
    }

    #viz-toggle {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 12;
      background: rgba(0, 0, 0, 0.6);
      color: #0f0;
      border: 1px solid #0f0;
      padding: 8px 14px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      display: none;
    }
    #viz-toggle:hover {
      background: rgba(0, 255, 0, 0.15);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
</head>

<body>
  <div id="overlay">
    <h1>CLICK PARA INICIAR</h1>
  </div>

  <div id="sensor-info"></div>

  <div id="audio-ui">
    <p id="zone-info" style="margin:0 0 8px 0;">Zona: Silencio</p>
    <div id="tracks-ui"></div>
  </div>

  <button id="viz-toggle">VIZ</button>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    // --- SHADER ---
    const vertShader = `#ifdef GL_ES
precision highp float;
#endif
attribute vec3 aPosition;
attribute vec2 aTexCoord;
varying vec2 vTexCoord;
void main() {
  vTexCoord = aTexCoord;
  vec4 positionVec4 = vec4(aPosition, 1.0);
  positionVec4.xy = positionVec4.xy * 2.0 - 1.0;
  gl_Position = positionVec4;
}`;

    const fragShader = `#ifdef GL_ES
precision highp float;
#endif
uniform vec2 iResolution;
uniform float iTime;
uniform vec3 uColor;       // color del track activo
uniform float uDist;       // distancia normalizada 0-1
uniform float uAngle;      // rotacion acumulada
uniform float uTemp;       // temperatura normalizada 0-1
uniform float uHum;        // humedad normalizada 0-1
uniform vec2 uPos;         // posicion X,Y normalizada
varying vec2 vTexCoord;

vec3 palette(float t, vec3 base){
    return sin(vec3(0.5)) + cos(vec3(0.5)) * cos(6.28318 * (base * cos(t) + sin(base)));
}

// Rotacion 2D
vec2 rot(vec2 p, float a){
    float c = cos(a), s = sin(a);
    return vec2(p.x*c - p.y*s, p.x*s + p.y*c);
}

void main() {
  vec2 uv = vTexCoord * 2.0 - 1.0;
  float scale = 1.0 + uDist * 2.0;
  uv.x *= scale * iResolution.x / iResolution.y;
  uv.y *= scale;

  // Posicion X,Y del target desplaza el centro
  uv += uPos * 0.3;

  // Angulo rota el patron
  uv = rot(uv, uAngle * 0.5);

  vec2 uv0 = uv;
  vec3 finalColor = vec3(0.0);
  float loops = 2.0 + uDist * 2.0;

  // Temperatura controla velocidad de animacion
  float speed = 0.08 + uTemp * 0.25;

  // Humedad controla grosor de lineas
  float thickness = 0.2 + uHum * 0.5;

  for (float i = 0.0; i < 4.0; i++) {
    if (i >= loops) break;
    uv = fract(uv * (1.2 + uDist * 0.5)) - 0.5;
    float d = length(uv) * exp(-length(uv0));
    vec3 col = palette(length(uv0) + i * 0.4 + iTime * speed, uColor);
    d = sin(d * (6.0 + uDist * 4.0) + iTime * speed) / 8.0;
    d = abs(d) / thickness;
    d = pow(0.01 / tan(d), 1.2);
    finalColor += col * d;
  }

  gl_FragColor = vec4(finalColor, 1.0);
}`;


    // --- CONFIGURACION DE AUDIOS E IMAGENES ---
    const AUDIOS = [
      'audios/OLAS.mp3',
      'audios/MEGAS.mp3',
      'audios/HORN.mp3',
      'audios/GERBERE.mp3',
      'audios/ERDOGEN.mp3',
      'audios/BARCA.mp3'
    ];

    // Imagen por track (mismo orden que AUDIOS) - reemplazar con las reales
    const IMAGES = [
      'img/jesus_01.jpg',   // OLAS
      'img/jesus_02.jpg',   // MEGAS
      'img/jesus_03.jpg',   // HORN
      'img/jesus_04.jpg',   // GERBERE
      'img/jesus_05.jpg',   // ERDOGEN
      'img/jesus_06.jpg'    // BARCA
    ];

    // Color por track (R, G, B normalizado 0-1)
    const TRACK_COLORS = [
      [0.2, 0.4, 0.8],   // OLAS - azul oceano
      [0.8, 0.2, 0.5],   // MEGAS - magenta
      [0.9, 0.6, 0.1],   // HORN - dorado
      [0.3, 0.8, 0.3],   // GERBERE - verde
      [0.7, 0.1, 0.1],   // ERDOGEN - rojo
      [0.1, 0.7, 0.7]    // BARCA - cyan
    ];

    const CROSSFADE = 300;
    // Orden aleatorio de tracks en cada carga
    const trackOrder = [0, 1, 2, 3, 4, 5];
    for (let i = trackOrder.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [trackOrder[i], trackOrder[j]] = [trackOrder[j], trackOrder[i]];
    }
    const ZONES = [
      { min: 210, max: 700, track: trackOrder[0] },
      { min: 710, max: 1200, track: trackOrder[1] },
      { min: 1210, max: 1700, track: trackOrder[2] },
      { min: 1710, max: 2200, track: trackOrder[3] },
      { min: 2210, max: 2700, track: trackOrder[4] },
      { min: 2710, max: 3200, track: trackOrder[5] }
    ];

    // --- ESTADO ---
    let systemStarted = false;
    const audioElements = [];
    const targetVolumes = new Array(AUDIOS.length).fill(0);
    // Suavizado de distancia para audio
    let smoothDist = -1;
    const DIST_EMA = 0.08;  // 0=muy suave, 1=sin filtro
    // Valores objetivo (se actualizan con MQTT)
    let targetColor = [0.3, 0.3, 0.3];
    let targetDist = 0;
    let targetRotSpeed = 0.002;  // velocidad base de rotacion
    let targetTemp = 0.5;
    let targetHum = 0.5;
    let targetPos = [0, 0];
    // Valores actuales (lerp hacia objetivo)
    let shaderColor = [0.3, 0.3, 0.3];
    let shaderDist = 0;
    let shaderAngle = 0;
    let shaderRotSpeed = 0.002;
    let shaderTemp = 0.5;
    let shaderHum = 0.5;
    let shaderPos = [0, 0];
    const LERP_SPEED = 0.06;
    let theShader;
    let trackImages = [];    // p5.Image por track
    let currentImgIndex = -1; // indice de imagen activa
    let pendingImgTrack = -1; // track candidato a cambio de imagen
    let pendingImgCount = 0;  // mensajes consecutivos con ese track dominante
    let currentViz = 0; // 0 = caleidoscopio, 1 = particulas
    // Particle flow system
    let particleGfx, imgGfx, noiseGfx;
    let particlesList = [];
    // =============================================
    // PARAMETROS AJUSTABLES DE PARTICULAS
    // =============================================
    const NUM_PARTICLES = 3500;        // cantidad de particulas
    const PARTICLE_MAX_LIFE = 60;     // vida maxima en frames
    const FADE_FRAMES = 15;            // frames de fade-in y fade-out
    const FLOW_SPEED_BASE = 1;       // velocidad base de flujo
    const FLOW_SPEED_MULT = 1.5;       // multiplicador de velocidad por distancia
    const STROKE_BASE = 2;            // tamaño base de particula (px)
    const STROKE_MULT = 3;            // multiplicador de tamaño por temperatura
    const BG_FADE_BASE = 2;            // alpha base del fondo (trail persistence)
    const BG_FADE_MULT = 2;           // multiplicador de fade por humedad
    const MAX_DRIFT_BASE = 15;         // radio minimo de deriva (px)
    const MAX_DRIFT_MULT = 25;         // radio extra de deriva por distancia
    const FLOW_NOISE_SCALE = 0.005;    // escala del Perlin noise (menor = mas suave)
    const HOME_PULL_STRENGTH = 0.08;   // fuerza de retorno al hogar
    const COLOR_TINT = 0.05;            // mezcla con color del shader (0-1)
    // =============================================

    // --- CREAR AUDIO ELEMENTS ---
    AUDIOS.forEach(src => {
      const a = new Audio(src);
      a.loop = true;
      a.volume = 0;
      audioElements.push(a);
    });

    // --- UI de tracks (en orden de zona) ---
    const tracksUI = document.getElementById('tracks-ui');
    ZONES.forEach((z, zi) => {
      const i = z.track;
      const div = document.createElement('div');
      div.className = 'track-bar';
      div.id = 'track-ui-' + i;
      const name = AUDIOS[i].split('/').pop().replace('.mp3', '');
      div.innerHTML = `
        <span class="track-name">${name}</span>
        <div class="vol"><div class="vol-fill" id="vol-fill-${i}" style="width:0%"></div></div>
        <span class="vol-val" id="vol-val-${i}">0%</span>
      `;
      tracksUI.appendChild(div);
    });

    // --- MQTT ---
    const clientId = "js_audio_" + Math.random().toString(16).substr(2, 8);
    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
      clientId: clientId,
      clean: true
    });

    client.on("connect", () => client.subscribe("JESIDI-IOT-POC-200574"));

    client.on("message", (_t, payload) => {
      try {
        const j = JSON.parse(payload.toString());

        document.getElementById('sensor-info').innerHTML = `
          <div>
            <span>X:${j.x} Y:${j.y}</span>
            <span>D:${j.dist}mm</span>
            <span>A:${j.ang}°</span>
            <span>T:${j.temp}°C</span>
            <span>H:${j.hum} HR</span>
          </div>
        `;
        if (systemStarted && j.dist != null) {
          if (smoothDist < 0) {
            smoothDist = j.dist;
          } else {
            smoothDist = DIST_EMA * j.dist + (1 - DIST_EMA) * smoothDist;
          }
          updateAudio(smoothDist);
        }
        // Shader targets (se interpolan en draw)
        if (j.ang != null) targetRotSpeed = 0.002 + Math.abs(j.ang) / 180.0 * 0.015;
        if (j.temp != null) targetTemp = Math.max(0, Math.min(1, j.temp / 40.0));
        if (j.hum != null) targetHum = Math.max(0, Math.min(1, j.hum / 100.0));
        if (j.x != null && j.y != null) {
          targetPos[0] = Math.max(-1, Math.min(1, j.x / 3000.0));
          targetPos[1] = Math.max(-1, Math.min(1, j.y / 3000.0));
        }
      } catch (e) { console.error("Error MQTT:", e); }
    });

    // --- LOGICA DE AUDIO ---
    function updateAudio(distMm) {
      targetVolumes.fill(0);
      let activeZone = -1;

      for (let i = 0; i < ZONES.length; i++) {
        const z = ZONES[i];
        if (distMm < z.min || distMm > z.max) continue;
        let vol = 1;
        activeZone = i;
        // Fade in solo si hay zona anterior
        if (i > 0 && distMm < z.min + CROSSFADE) {
          vol = (distMm - z.min) / CROSSFADE;
          targetVolumes[ZONES[i - 1].track] = 1 - vol;
        }
        // Fade out solo si hay zona siguiente
        if (i < ZONES.length - 1 && distMm > z.max - CROSSFADE) {
          vol = (z.max - distMm) / CROSSFADE;
          targetVolumes[ZONES[i + 1].track] = 1 - vol;
        }
        targetVolumes[z.track] = Math.max(0, Math.min(1, vol));
        break;
      }

      // Aplicar volumenes
      audioElements.forEach((a, i) => { a.volume = targetVolumes[i]; });

      // Color del shader: mezcla ponderada por volumen de todos los tracks
      let r = 0, g = 0, b = 0, totalVol = 0;
      targetVolumes.forEach((v, i) => {
        r += TRACK_COLORS[i][0] * v;
        g += TRACK_COLORS[i][1] * v;
        b += TRACK_COLORS[i][2] * v;
        totalVol += v;
      });
      if (totalVol > 0) {
        targetColor = [r / totalVol, g / totalVol, b / totalVol];
      } else {
        targetColor = [0.15, 0.15, 0.15];
      }

      targetDist = Math.max(0, Math.min(1, distMm / 3200));

      // UI - mostrar el track con mayor volumen
      let loudestTrack = -1;
      let loudestVol = 0;
      targetVolumes.forEach((v, i) => {
        if (v > loudestVol) { loudestVol = v; loudestTrack = i; }
      });
      document.getElementById('zone-info').textContent =
        loudestTrack >= 0 ? 'Zona: ' + AUDIOS[loudestTrack].split('/').pop().replace('.mp3', '') : 'Zona: Silencio';

      // Cambiar imagen con histeresis para evitar saltos bruscos
      if (loudestTrack >= 0) {
        if (loudestTrack === pendingImgTrack) {
          pendingImgCount++;
          if (pendingImgCount >= 8) { // 8 mensajes consecutivos para confirmar cambio
            setParticleImage(loudestTrack);
          }
        } else {
          pendingImgTrack = loudestTrack;
          pendingImgCount = 1;
        }
      }

      targetVolumes.forEach((v, i) => {
        const pct = (v * 100).toFixed(1);
        document.getElementById('vol-fill-' + i).style.width = pct + '%';
        document.getElementById('vol-val-' + i).textContent = pct + '%';
        document.getElementById('track-ui-' + i).className =
          v > 0 ? 'track-bar active-track' : 'track-bar';
      });
    }

    // --- P5.JS SHADER ---
    function preload() {
      IMAGES.forEach(src => {
        trackImages.push(loadImage(src));
      });
    }

    function getPixelFast(gfx, x, y) {
      let ix = Math.min(Math.max(Math.floor(x), 0), gfx.width - 1);
      let iy = Math.min(Math.max(Math.floor(y), 0), gfx.height - 1);
      let idx = (iy * gfx.width + ix) * 4;
      return [gfx.pixels[idx], gfx.pixels[idx + 1], gfx.pixels[idx + 2]];
    }

    function initParticleBuffers(resetParticles) {
      // Recrear buffers si no existen o si el tamaño cambio
      if (!imgGfx || imgGfx.width !== width || imgGfx.height !== height) {
        if (imgGfx) { imgGfx.remove(); noiseGfx.remove(); particleGfx.remove(); }
        imgGfx = createGraphics(width, height);
        noiseGfx = createGraphics(width, height);
        particleGfx = createGraphics(width, height);
        imgGfx.pixelDensity(1);
        noiseGfx.pixelDensity(1);
        particleGfx.pixelDensity(1);
        particleGfx.background(0);
      }

      // Usar la imagen del track activo, o la primera por defecto
      let srcImg = trackImages[currentImgIndex >= 0 ? currentImgIndex : 0];
      if (!srcImg || srcImg.width === 0) return; // imagen aun no cargada

      // Escalar para cubrir todo el canvas (cover)
      let ratioW = width / srcImg.width;
      let ratioH = height / srcImg.height;
      let sc = Math.max(ratioW, ratioH);
      let iw = Math.ceil(srcImg.width * sc);
      let ih = Math.ceil(srcImg.height * sc);

      imgGfx.imageMode(CENTER);
      imgGfx.background(0);
      imgGfx.image(srcImg, width / 2, height / 2, iw, ih);
      imgGfx.loadPixels();

      noiseGfx.imageMode(CENTER);
      noiseGfx.background(0);
      noiseGfx.image(srcImg, width / 2, height / 2, iw, ih);
      noiseGfx.filter(GRAY);
      noiseGfx.filter(BLUR, 6);
      noiseGfx.loadPixels();

      if (resetParticles || particlesList.length === 0) {
        particlesList = [];
        for (let i = 0; i < NUM_PARTICLES; i++) {
          let hx = random(width);
          let hy = random(height);
          particlesList.push({
            x: hx, y: hy,
            hx: hx, hy: hy,
            life: floor(random(PARTICLE_MAX_LIFE))
          });
        }
      }
    }

    // Cambiar la imagen de particulas al cambiar de zona
    function setParticleImage(trackIndex) {
      if (trackIndex === currentImgIndex) return;
      currentImgIndex = trackIndex;
      if (imgGfx) initParticleBuffers(false); // actualizar buffers sin resetear particulas
    }

    function setup() {
      createCanvas(windowWidth, windowHeight, WEBGL);
      pixelDensity(1);
      noStroke();
      theShader = createShader(vertShader, fragShader);
      initParticleBuffers(true);
    }

    function lerpVal(current, target, speed) {
      return current + (target - current) * speed;
    }

    function draw() {
      // Interpolar todos los valores suavemente
      const s = LERP_SPEED;
      shaderColor[0] = lerpVal(shaderColor[0], targetColor[0], s);
      shaderColor[1] = lerpVal(shaderColor[1], targetColor[1], s);
      shaderColor[2] = lerpVal(shaderColor[2], targetColor[2], s);
      shaderDist = lerpVal(shaderDist, targetDist, s);
      shaderRotSpeed = lerpVal(shaderRotSpeed, targetRotSpeed, s);
      shaderAngle += shaderRotSpeed;
      shaderTemp = lerpVal(shaderTemp, targetTemp, s);
      shaderHum = lerpVal(shaderHum, targetHum, s);
      shaderPos[0] = lerpVal(shaderPos[0], targetPos[0], s);
      shaderPos[1] = lerpVal(shaderPos[1], targetPos[1], s);

      if (currentViz === 0) {
        shader(theShader);
        theShader.setUniform("iResolution", [width, height]);
        theShader.setUniform("iTime", millis() / 1000.0);
        theShader.setUniform("uColor", shaderColor);
        theShader.setUniform("uDist", shaderDist);
        theShader.setUniform("uAngle", shaderAngle);
        theShader.setUniform("uTemp", shaderTemp);
        theShader.setUniform("uHum", shaderHum);
        theShader.setUniform("uPos", shaderPos);
      } else {
        // Particle image visualization
        // Las particulas nacen en su "hogar", se mueven con flow field sutil,
        // y al morir renacen en su hogar para reconstruir la imagen continuamente
        let flowSpeed = FLOW_SPEED_BASE + shaderDist * FLOW_SPEED_MULT;
        let sw = STROKE_BASE + shaderTemp * STROKE_MULT;
        let fadeAlpha = BG_FADE_BASE + (1 - shaderHum) * BG_FADE_MULT;
        let windX = shaderPos[0] * 0.3;
        let windY = shaderPos[1] * 0.3;
        let t = millis() / 1000.0;

        particleGfx.background(0, fadeAlpha);
        particleGfx.strokeWeight(sw);

        for (let i = 0; i < NUM_PARTICLES; i++) {
          let p = particlesList[i];

          // Color: mezcla entre posicion actual (70%) y home (30%)
          // Asi la particula siempre pinta colores fieles a la imagen
          let colHere = getPixelFast(imgGfx, p.x, p.y);
          let colHome = getPixelFast(imgGfx, p.hx, p.hy);
          let cm = 0.7; // peso de posicion actual
          let colR = colHere[0] * cm + colHome[0] * (1 - cm);
          let colG = colHere[1] * cm + colHome[1] * (1 - cm);
          let colB = colHere[2] * cm + colHome[2] * (1 - cm);
          let brightness = (colR + colG + colB) / 3;

          // Opacidad base por brillo de imagen
          let alpha = map(brightness, 0, 50, 40, 220, true);
          // Fade-in / fade-out
          let age = PARTICLE_MAX_LIFE - p.life;
          if (age < FADE_FRAMES) alpha *= age / FADE_FRAMES;
          if (p.life < FADE_FRAMES) alpha *= p.life / FADE_FRAMES;
          // Mezclar color con tinte del shader activo
          let r = colR * (1 - COLOR_TINT) + shaderColor[0] * 255 * COLOR_TINT;
          let g = colG * (1 - COLOR_TINT) + shaderColor[1] * 255 * COLOR_TINT;
          let b = colB * (1 - COLOR_TINT) + shaderColor[2] * 255 * COLOR_TINT;

          particleGfx.stroke(r, g, b, alpha);
          particleGfx.point(p.x, p.y);

          // Flow field basado en Perlin noise
          let a = noise(p.x * FLOW_NOISE_SCALE, p.y * FLOW_NOISE_SCALE, t * 0.08) * TWO_PI * 2;
          a += shaderAngle * 0.2;
          let fx = cos(a) * flowSpeed + windX;
          let fy = sin(a) * flowSpeed + windY;

          // Fuerza de retorno al hogar: mas fuerte cuanto mas lejos
          let dx = p.hx - p.x;
          let dy = p.hy - p.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          let maxDrift = MAX_DRIFT_BASE + shaderDist * MAX_DRIFT_MULT;
          let homePull = map(dist, 0, maxDrift, 0, 0.8, true);
          fx += dx * homePull * HOME_PULL_STRENGTH;
          fy += dy * homePull * HOME_PULL_STRENGTH;

          p.x += fx;
          p.y += fy;
          p.life--;

          // Al morir o salir del canvas: renacer en el hogar
          if (p.life <= 0 || p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
            // Reasignar hogar con leve variacion para distribucion natural
            p.hx = p.hx + random(-2, 2);
            p.hy = p.hy + random(-2, 2);
            p.hx = constrain(p.hx, 0, width - 1);
            p.hy = constrain(p.hy, 0, height - 1);
            p.x = p.hx;
            p.y = p.hy;
            p.life = floor(random(PARTICLE_MAX_LIFE * 0.5, PARTICLE_MAX_LIFE));
          }
        }

        resetShader();
        image(particleGfx, -width / 2, -height / 2, width, height);
        return;
      }
      rect(-width / 2, -height / 2, width, height);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      imgGfx = null; // forzar recrear buffers al nuevo tamaño
      initParticleBuffers(true);
    }

    // --- INICIO ---
    document.getElementById('overlay').addEventListener('click', function () {
      if (!systemStarted) {
        // Primera pulsacion: iniciar app y entrar en fullscreen
        this.style.display = 'none';
        audioElements.forEach(a => {
          a.play().catch(e => console.log("Error play:", e));
        });
        systemStarted = true;
        document.getElementById('viz-toggle').style.display = 'block';
        const el = document.documentElement;
        
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        
      }
    });

    // Toggle visualizacion
    document.getElementById('viz-toggle').addEventListener('click', function (e) {
      e.stopPropagation();
      currentViz = currentViz === 0 ? 1 : 0;
      this.textContent = currentViz === 0 ? 'VIZ' : 'VIZ';
    });

    // Toggle fullscreen al hacer click en el canvas
    document.addEventListener('click', function (e) {
      if (!systemStarted) return;
      if (e.target.tagName === 'CANVAS') {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        } else {
          const el = document.documentElement;
          if (el.requestFullscreen) el.requestFullscreen();
          else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }
      }
    });
  </script>
</body>

</html>
